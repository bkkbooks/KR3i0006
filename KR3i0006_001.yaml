body:
  text: 端溪硯譜謹按端州治髙要縣自唐為髙要郡皇朝政和初以太上皇潜藩賜號肇慶府府東三十三里有山曰斧柯在大江之南蓋靈羊峽之對山也斧柯山峻峙壁立下際潮水自江之湄登山行三四里即為硯嵓也先至者曰下嵓下嵓之中有泉出焉雖大旱未嘗涸下嵓之上曰中嵓中嵓之上曰上嵓自上嵓轉山之背曰龍嵓龍嵓蓋唐取硯之所後下嵓得石勝龍嵓龍嵓不復取自山之下分路稍東至半邊山諸嵓西南㳂溪而上曰蚌坑龍嵓斧柯山腳谷中石也大抵石以下嵓為上中嵓龍嵓半邊山諸嵓次之上嵓又次之蚌坑最下此嵓石之品也下嵓石乾則灰蒼色潤則青紫色嵓有兩口其中則通為一穴大者取研所自入也小者泉水所自出也故號曰水口即陳公密所開也嵓之北壁石背為泉水所浸瀰漫湧溢下流為溪嵓之中歲久崩摧石屑翳塞積水屈曲淺深人所莫測以是石工不復能採矣今世所有下嵓硯唐五季國初時物也今欲得下嵓北壁石者往往於泉水石屑中得之若南壁石尚或可採然自崇觀以後亦罕得矣北壁石蓋泉生其中非石生泉中也則潤可知矣嵓之上雖秋冬乾旱亦未嘗涸有泉珠散落如飛雨不絶北壁石眼正圓有青緑碧紫白黑暈十數重中復有瞳子南壁石即泉水半浸者稍不及北壁眼之暈色皆少淡下嵓上嵓皆在山半上嵓之穴陟而取石中嵓之穴或陟或降下嵓之穴降而取石上嵓有三穴上穴曰土地嵓以土地祠居其上名焉中嵓曰梅樹嵓下穴今石工以為中嵓者是也下穴兩口其間通為一穴皆中嵓也土地嵓亦有兩穴其中亦相通土地嵓石色帶黃赤眼亦如之梅樹嵓石微黃赤稍輕而帶灰蒼色眼黃緑中嵓兩壁石與梅樹嵓同而少勝焉北壁石則與下嵓南壁石相類而少劣焉大抵石性貴潤色貴青紫乾則灰蒼色潤則青紫色眼貴翠緑圓正有曈子石有眼則易分品第若性枯燥色黃褐乾則灰蒼色潤則青紫色眼赤黃皆下品也眼赤黃輕青緑重即漸為上品矣龍嵓石色深紫眼少有即類中嵓半邊山者半邊山諸嵓石色少灰青與下嵓南壁石中嵓北壁石相類但眼不若下嵓則眼暈少爾中嵓者層暈多青緑赤黃紫色皆淺深不同然半邊山嵓極多眼半邊山嵓近南者眼大暈差少緑近北者眼少暈愈少所謂菉豆眼蚌坑石性堅顔色深紫有眼即黃白微帶青色不正無瞳子雖潤亦不發墨眼偏斜不正無暈道有翳黃坑石即與上嵓石相類新坑石與半邊山石之劣者相類但半段碎小耳小湘峽在州之西四十里其石類嵓石而性軟燥色深紫如蚌坑及後厯石眼亦類蚌坑石大抵潤及坑石而發墨勝之後厯山在州北十里石性軟燥色深紫帶黃赤間亦有眼極類蚌坑堅潤不及發墨勝之嵓石取諸嵓斧併力然後可得凡嵓石皆有黃臕如玉之瓜蔞也胞絡黃臕鑿去方見硯材世所謂子石也子石嵓中有底石皆頑石極潤不發墨又色汙雜不可硯端人謂之鴨屎石底石之上大率如石榴子又如磚坯自底至頂中作三疊下疊居底石之上最佳品也石必有眼端人謂之腳石中疊居下疊之上次石也眼或有或無端人謂之腰石上疊居中疊之上又次石也皆無眼端人謂之頂石頂石之上皆蓋石也亦頑粗而不堪用大抵三疊石皆有粗臕絡無非子石世人乃謂别一種子石非也蓋往往有崩落嵓中泉水中者其形偶圓類卵人或中摸得之故妄有此說蚌坑石取於山下澗谷中皆波濤所擊風日所曝雷雨所摧皆頑佷不才之物也但人能到其處皆可拾取端人謂之野石蓋遍地是也甚易得之而他處人不識往往反愛之正以大璞少瑕翳耳其小湘石後厯石皆掘地取嵓石不假油蠟久則自光潤後厯非油蠟則不堪用歲次油蠟敗則粗燥不堪用矣蚌坑自鼎湖山諸谷水聚為大溪轉斧柯山下出大江中半邊山諸嵓有大秋風小秋風獸頭獅子桃花河頭新坑黃坑等名皆在斧柯山下蓋山之麗也凡有眼之石在本嵓中尤縝密溫潤端人謂石嫩則眼多老則眼少嫩石細潤發墨所以重有眼也青脉者必有眼故腰石腳石多有青脉而頂石多瑩淨端人謂青脉為眼筋夫眼之别者曰鸜鵒曰鸚哥曰了哥秦吉了也曰雀眼曰雞眼曰猫眼曰菉豆各以形似名之翠緑為上李賀有端州青花石硯歌蓋自唐以來便以青眼為上黃赤為下硯之價下嵓水底腳石十倍於南壁石南壁石十倍於中嵓北壁石半邊山南諸嵓倍於中嵓南壁石半邊山北諸嵓及龍嵓中嵓南壁倍上嵓諸穴石上嵓諸穴倍小湘石小湘石倍後厯蚌坑石後厯之佳者亦與上嵓諸穴價等硯之形製曰平底風字曰有腳風字曰垂裙風字曰古樣風字曰鳯池曰四直曰古樣四直曰雙錦四直曰合歡四直曰箕樣曰斧樣曰瓜樣曰卵樣曰壁樣曰人面曰蓮曰荷葉曰仙桃曰瓢樣曰鼎樣曰玉臺曰天研東坡嘗得石不加斧鑿以為研後人尋嵓石自然平整者效之曰蟾樣曰龜樣曰曲水曰鐘樣曰圭樣曰笏樣曰梭樣曰琴樣曰𨫼樣曰雙魚樣曰團樣曰八稜角柄秉硯曰八稜秉硯曰竹節秉硯曰硯磚曰硯板曰房相樣曰琵琶樣曰月樣曰腰鼓曰馬蹄曰月池曰阮樣曰歙樣曰吕樣曰琴足風字曰蓬萊樣宣和初御府降樣造形若風字如鳯池樣但平底耳有四環刻海水魚龍三神山水池作崑崙狀左日右月星斗羅列以供太上皇書府之用石之病者有曰鐵線乃是臕皮隔處若於線上鑿之則應手而斷曰瑖白文曰鑽如蛀蟲眼曰驚斧鑿觸裂者曰火黯一名尉火焦惟嵓石有之斜斑處如火燒狀曰黃龍灰黃色如龍蛇橫斜布石上唯火黯端人不以為病蓋嵓石必有之他山石皆無右縉雲葉樾交叔傳此譜稍異於衆人之說不知何人所撰稱徽祖為太上皇必紹興初人云淳熙十年七月二十四日東平榮芑書端溪硯譜
